<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ title }} — Smart Employee Assistant">
  <title>{{ title }} | Smart Employee Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="header-accent" aria-hidden="true"></div>
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L4 8v8l8 5 8-5V8l-8-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M12 12l8-5M12 12L4 7M12 12v9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <p class="brand-eyebrow">Internal Employee Portal</p>
          <h1 class="brand-title">Smart Employee Assistant</h1>
          <p class="brand-subtitle">AI-Powered IT Support Knowledge Assistant</p>
        </div>
      </div>
      <nav class="header-meta" aria-label="Navigation">
        <a href="{{ home_url }}" class="header-portal-link">Home</a>
        <span class="meta-divider" aria-hidden="true"></span>
        <a href="{{ it_portal_url }}" class="header-portal-link">IT Team</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="main-content">
    <div class="container portal-auth-container">
      <section class="workspace-card portal-auth-card portal-error-card" aria-labelledby="error-heading">
        <header class="panel-header panel-header--primary">
          <div class="panel-icon panel-icon--primary" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="panel-header-text">
            <h2 id="error-heading" class="panel-title">{{ title }}</h2>
            <p class="panel-description">{{ message }}</p>
          </div>
        </header>
        <div class="portal-error-actions">
          <a href="{{ home_url }}" class="btn btn-primary">Return to home</a>
          <a href="{{ it_portal_url }}" class="btn btn-secondary">IT Portal</a>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <p class="footer-text">Smart Employee Assistant &mdash; Powered by Amazon Bedrock Knowledge Base</p>
    </div>
  </footer>
</body>
</html>
